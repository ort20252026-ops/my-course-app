<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Telegram Mini App Course Platform</title>
</head>
<body>
    <div class="container">
        <header class="my-4">
            <h1 class="text-center">Telegram Mini App Course Platform</h1>
        </header>
        <div class="row">
            <div class="col-md-8">
                <h2>Courses Listing</h2>
                <ul class="list-group">
                    <li class="list-group-item"><a href="#" class="btn btn-primary">Course 1</a></li>
                    <li class="list-group-item"><a href="#" class="btn btn-primary">Course 2</a></li>
                    <li class="list-group-item"><a href="#" class="btn btn-primary">Course 3</a></li>
                </ul>
                <div class="lesson-view mt-4">
                    <h2>Lessons View</h2>
                    <div class="embed-responsive embed-responsive-16by9">
                        <iframe class="embed-responsive-item" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <h2>Admin Panel</h2>
                <form>
                    <div class="mb-3">
                        <label for="courseName" class="form-label">Course Name</label>
                        <input type="text" class="form-control" id="courseName" required>
                    </div>
                    <button type="submit" class="btn btn-success">Add Course</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
