<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

.switch {
    text-align: center;
    margin-top: 10px;
}

.switch span {
    color: #6366f1;
    cursor: pointer;
}

.hidden {
    display: none;
}

/* APP */
#app {
    width: 100%;
    max-width: 600px;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    color: white;
}

.course {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
}

.video {
    margin-bottom: 20px;
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authPage" class="card">

    <!-- LOGIN -->
    <div id="loginForm">
        <h2>Вход</h2>
        <input id="loginEmail" placeholder="Логин">
        <input id="loginPass" type="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>

        <div class="switch">
            Нет аккаунта? <span onclick="showRegister()">Регистрация</span>
        </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
        <h2>Регистрация</h2>
        <input id="regName" placeholder="Имя">
        <input id="regEmail" placeholder="Email">
        <input id="regPass" type="password" placeholder="Пароль">
        <input id="regConfirm" type="password" placeholder="Повторите пароль">
        <button onclick="register()">Создать</button>

        <div class="switch">
            Уже есть аккаунт? <span onclick="showLogin()">Вход</span>
        </div>
    </div>

</div>

<!-- APP -->
<div id="app" class="hidden">

    <div class="header">
        <span>📚 Courses</span>
        <button onclick="logout()">Выйти</button>
    </div>

    <!-- COURSES -->
    <div id="coursesPage">
        <h2 style="color:white">Курсы</h2>
        <div id="coursesList"></div>
    </div>

    <!-- LESSONS -->
    <div id="lessonsPage" class="hidden">
        <button onclick="back()">⬅ Назад</button>
        <h2 id="courseTitle"></h2>
        <div id="lessonsList"></div>
    </div>

    <!-- ADMIN -->
    <div id="adminPage" class="hidden">
        <h2 style="color:white">👑 Админ панель</h2>

        <input id="courseInput" placeholder="Название курса">
        <button onclick="addCourse()">Добавить курс</button>

        <input id="lessonCourse" placeholder="Название курса">
        <input id="lessonTitle" placeholder="Название урока">
        <input id="lessonVideo" placeholder="Ссылка YouTube">
        <button onclick="addLesson()">Добавить урок</button>

        <div id="adminCourses"></div>
    </div>

</div>

<script>

/* 👑 ВСТРОЕННЫЙ АДМИН */
(function() {
    let users = JSON.parse(localStorage.getItem("users") || "[]");

    if (!users.find(u => u.email === "user614362")) {
        users.push({
            name: "fol",
            email: "user614362",
            password: "ppjquc",
            is_admin: 1
        });
        localStorage.setItem("users", JSON.stringify(users));
    }
})();

/* ПЕРЕКЛЮЧЕНИЕ */
function showRegister() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

/* РЕГИСТРАЦИЯ */
function register() {
    let name = regName.value;
    let email = regEmail.value;
    let pass = regPass.value;
    let confirm = regConfirm.value;

    if (!name || !email || pass.length < 8 || pass !== confirm) {
        alert("Ошибка регистрации");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    users.push({ name, email, password: pass, is_admin: 0 });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Регистрация успешна");
    showLogin();
}

/* ВХОД */
function login() {
    let email = loginEmail.value;
    let pass = loginPass.value;

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    let user = users.find(u => u.email === email && u.password === pass);

    if (!user) {
        alert("❌ Неверные данные");
        return;
    }

    localStorage.setItem("currentUser", JSON.stringify(user));
    enterApp(user);
}

/* АВТОВХОД */
window.onload = function() {
    let user = JSON.parse(localStorage.getItem("currentUser"));
    if (user) enterApp(user);
};

/* ВХОД В СИСТЕМУ */
function enterApp(user) {
    authPage.style.display = "none";
    app.classList.remove("hidden");

    loadCourses();

    if (user.is_admin == 1) {
        adminPage.classList.remove("hidden");
        loadAdmin();
    }
}

/* КУРСЫ */
function loadCourses() {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");
    coursesList.innerHTML = "";

    courses.forEach((c, i) => {
        coursesList.innerHTML += `<div class="course" onclick="openCourse(${i})">${c.title}</div>`;
    });
}

let currentIndex = null;

/* ОТКРЫТЬ КУРС */
function openCourse(i) {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    currentIndex = i;

    coursesPage.classList.add("hidden");
    lessonsPage.classList.remove("hidden");

    courseTitle.innerText = courses[i].title;

    lessonsList.innerHTML = "";

    courses[i].lessons.forEach(l => {
        let id = getYoutubeId(l.video);

        lessonsList.innerHTML += `
            <div class="video">
                <h3>${l.title}</h3>
                <iframe width="100%" height="200"
                src="https://www.youtube.com/embed/${id}"
                frameborder="0" allowfullscreen></iframe>
            </div>
        `;
    });
}

/* YOUTUBE ID */
function getYoutubeId(url) {
    let reg = /(?:youtube\\.com.*v=|youtu\\.be\\/)([^&]+)/;
    let match = url.match(reg);
    return match ? match[1] : url;
}

/* НАЗАД */
function back() {
    lessonsPage.classList.add("hidden");
    coursesPage.classList.remove("hidden");
}

/* ДОБАВИТЬ КУРС */
function addCourse() {
    let title = courseInput.value;

    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    courses.push({ title, lessons: [] });

    localStorage.setItem("courses", JSON.stringify(courses));

    loadCourses();
    loadAdmin();
}

/* ДОБАВИТЬ УРОК */
function addLesson() {
    let name = lessonCourse.value;
    let title = lessonTitle.value;
    let video = lessonVideo.value;

    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    let course = courses.find(c => c.title === name);

    if (!course) {
        alert("Курс не найден");
        return;
    }

    course.lessons.push({ title, video });

    localStorage.setItem("courses", JSON.stringify(courses));

    loadAdmin();
}

/* АДМИН */
function loadAdmin() {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    adminCourses.innerHTML = "";

    courses.forEach((c, i) => {
        adminCourses.innerHTML += `
            <div>
                ${c.title}
                <button onclick="deleteCourse(${i})">❌</button>
            </div>
        `;
    });
}

/* УДАЛИТЬ */
function deleteCourse(i) {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    courses.splice(i, 1);

    localStorage.setItem("courses", JSON.stringify(courses));

    loadCourses();
    loadAdmin();
}

/* ВЫХОД */
function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

</script>

</body>
</html>
