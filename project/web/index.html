<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: white;
    padding: 30px;
    border-radius: 16px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: fade 0.4s ease;
}

@keyframes fade {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
}

input:focus {
    border-color: #6366f1;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #6366f1;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4f46e5;
}

/* LINK */
.switch {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}

.switch span {
    color: #6366f1;
    cursor: pointer;
}

/* ERROR */
.error {
    color: red;
    font-size: 12px;
}

/* HIDE */
.hidden {
    display: none;
}
</style>
</head>
<body>

<div class="card">

    <!-- LOGIN -->
    <div id="loginForm">
        <h2>Вход</h2>

        <input id="loginEmail" placeholder="Email">
        <div id="loginEmailErr" class="error"></div>

        <input id="loginPass" type="password" placeholder="Пароль">
        <div id="loginPassErr" class="error"></div>

        <button onclick="login()">Войти</button>

        <div class="switch">
            Нет аккаунта? <span onclick="showRegister()">Регистрация</span>
        </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
        <h2>Регистрация</h2>

        <input id="name" placeholder="Имя">
        <div id="nameErr" class="error"></div>

        <input id="email" placeholder="Email">
        <div id="emailErr" class="error"></div>

        <input id="password" type="password" placeholder="Пароль">
        <div id="passErr" class="error"></div>

        <input id="confirm" type="password" placeholder="Повторите пароль">
        <div id="confirmErr" class="error"></div>

        <button onclick="register()">Зарегистрироваться</button>

        <div class="switch">
            Уже есть аккаунт? <span onclick="showLogin()">Вход</span>
        </div>
    </div>

</div>

<script>
function showRegister() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

function validateEmail(email) {
    return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email);
}

/* REGISTER */
function register() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    let ok = true;

    document.getElementById("nameErr").innerText = "";
    document.getElementById("emailErr").innerText = "";
    document.getElementById("passErr").innerText = "";
    document.getElementById("confirmErr").innerText = "";

    if (name === "") {
        document.getElementById("nameErr").innerText = "Введите имя";
        ok = false;
    }

    if (!validateEmail(email)) {
        document.getElementById("emailErr").innerText = "Неверный email";
        ok = false;
    }

    if (password.length < 8) {
        document.getElementById("passErr").innerText = "Минимум 8 символов";
        ok = false;
    }

    if (password !== confirm) {
        document.getElementById("confirmErr").innerText = "Пароли не совпадают";
        ok = false;
    }

    if (!ok) return;

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    users.push({ name, email, password, is_admin: 0 });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Регистрация успешна");

    showLogin();
}

/* LOGIN */
function login() {
    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPass").value;

    let ok = true;

    document.getElementById("loginEmailErr").innerText = "";
    document.getElementById("loginPassErr").innerText = "";

    if (!validateEmail(email)) {
        document.getElementById("loginEmailErr").innerText = "Неверный email";
        ok = false;
    }

    if (password.length < 8) {
        document.getElementById("loginPassErr").innerText = "Минимум 8 символов";
        ok = false;
    }

    if (!ok) return;

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    let user = users.find(u => u.email === email && u.password === password);

    if (!user) {
        alert("Неверный логин или пароль");
        return;
    }

    localStorage.setItem("currentUser", JSON.stringify(user));

    alert("Ты вошёл ✅");

    // дальше будет переход
}
</script>

</body>
</html>
