<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    height: 100vh;
}

/* AUTH CENTER */
#authPage {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

.switch {
    text-align: center;
    margin-top: 10px;
}

.switch span {
    color: #6366f1;
    cursor: pointer;
}

.hidden {
    display: none;
}

/* APP */
#app {
    padding: 10px;
}

.header {
    display: flex;
    justify-content: space-between;
    color: white;
}

.course {
    background: white;
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
}

.lesson-item {
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    cursor: pointer;
    background: #eee;
}

.active {
    background: #6366f1;
    color: white;
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authPage">
<div class="card">

<div id="loginForm">
<h2>Вход</h2>
<input id="loginEmail" placeholder="Логин">
<input id="loginPass" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>

<div class="switch">
Нет аккаунта? <span onclick="showRegister()">Регистрация</span>
</div>
</div>

<div id="registerForm" class="hidden">
<h2>Регистрация</h2>
<input id="regName" placeholder="Имя">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Пароль">
<input id="regConfirm" type="password" placeholder="Повторите пароль">
<button onclick="register()">Создать</button>

<div class="switch">
Есть аккаунт? <span onclick="showLogin()">Вход</span>
</div>
</div>

</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="header">
<h2>📚 Курсы</h2>
<button onclick="logout()">Выйти</button>
</div>

<div id="coursesPage"></div>

<div id="playerPage" class="hidden">
<button onclick="back()">⬅ Назад</button>
<h2 id="courseTitle" style="color:white"></h2>

<div id="player"></div>
<div id="lessonList"></div>
</div>

<div id="adminPage" class="hidden">
<h2 style="color:white">👑 Админ</h2>

<input id="courseInput" placeholder="Название курса">
<button onclick="addCourse()">Добавить курс</button>

<input id="lessonCourse" placeholder="Курс">
<input id="lessonTitle" placeholder="Урок">
<input id="lessonVideo" placeholder="YouTube ссылка">
<button onclick="addLesson()">Добавить урок</button>
</div>

</div>

<script>

/* АДМИН */
(function(){
let users = JSON.parse(localStorage.getItem("users")||"[]");

if(!users.find(u=>u.email==="user614362")){
users.push({
name:"fol",
email:"user614362",
password:"ppjquc",
is_admin:1
});
localStorage.setItem("users",JSON.stringify(users));
}
})();

/* UI */
function showRegister(){
loginForm.classList.add("hidden");
registerForm.classList.remove("hidden");
}
function showLogin(){
registerForm.classList.add("hidden");
loginForm.classList.remove("hidden");
}

/* REGISTER */
function register(){
let name=regName.value;
let email=regEmail.value;
let pass=regPass.value;
let confirm=regConfirm.value;

if(!name||!email||pass.length<8||pass!==confirm){
alert("Ошибка");
return;
}

let users=JSON.parse(localStorage.getItem("users")||"[]");
users.push({name,email,password:pass,is_admin:0});
localStorage.setItem("users",JSON.stringify(users));

alert("Готово");
showLogin();
}

/* LOGIN */
function login(){
let email=loginEmail.value;
let pass=loginPass.value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

let user=users.find(u=>u.email===email&&u.password===pass);

if(!user){alert("Ошибка");return;}

localStorage.setItem("currentUser",JSON.stringify(user));
enter(user);
}

/* AUTO */
window.onload=function(){
let user=JSON.parse(localStorage.getItem("currentUser"));
if(user) enter(user);
};

/* ENTER */
function enter(user){
authPage.style.display="none";
app.classList.remove("hidden");

loadCourses();

if(user.is_admin){
adminPage.classList.remove("hidden");
}
}

/* COURSES */
function loadCourses(){
let courses=JSON.parse(localStorage.getItem("courses")||"[]");

coursesPage.innerHTML="";

courses.forEach((c,i)=>{
coursesPage.innerHTML+=`<div class="course" onclick="openCourse(${i})">${c.title}</div>`;
});
}

let currentCourse=null;
let currentLesson=0;

/* OPEN */
function openCourse(i){
let courses=JSON.parse(localStorage.getItem("courses")||"[]");
currentCourse=courses[i];

let progress=JSON.parse(localStorage.getItem("progress")||"{}");
currentLesson=progress[currentCourse.title]||0;

coursesPage.classList.add("hidden");
playerPage.classList.remove("hidden");

courseTitle.innerText=currentCourse.title;

renderPlayer();
renderLessons();
}

/* PLAYER */
function renderPlayer(){
let lesson=currentCourse.lessons[currentLesson];
let id=getId(lesson.video);

player.innerHTML=`
<iframe width="100%" height="220"
src="https://www.youtube.com/embed/${id}"
frameborder="0" allowfullscreen></iframe>

<h3 style="color:white">${lesson.title}</h3>
`;
}

/* LESSONS */
function renderLessons(){
lessonList.innerHTML="";

currentCourse.lessons.forEach((l,i)=>{
lessonList.innerHTML+=`
<div class="lesson-item ${i===currentLesson?"active":""}"
onclick="selectLesson(${i})">
${i+1}. ${l.title}
</div>`;
});
}

/* SELECT */
function selectLesson(i){
currentLesson=i;

let progress=JSON.parse(localStorage.getItem("progress")||"{}");
progress[currentCourse.title]=i;
localStorage.setItem("progress",JSON.stringify(progress));

renderPlayer();
renderLessons();
}

/* YOUTUBE */
function getId(url){
let m=url.match(/(?:v=|youtu\\.be\\/)([^&]+)/);
return m?m[1]:url;
}

/* BACK */
function back(){
playerPage.classList.add("hidden");
coursesPage.classList.remove("hidden");
}

/* ADMIN */
function addCourse(){
let title=courseInput.value;

let courses=JSON.parse(localStorage.getItem("courses")||"[]");
courses.push({title,lessons:[]});

localStorage.setItem("courses",JSON.stringify(courses));
loadCourses();
}

function addLesson(){
let name=lessonCourse.value;
let title=lessonTitle.value;
let video=lessonVideo.value;

let courses=JSON.parse(localStorage.getItem("courses")||"[]");

let c=courses.find(x=>x.title===name);
if(!c){alert("нет курса");return;}

c.lessons.push({title,video});

localStorage.setItem("courses",JSON.stringify(courses));
}

/* LOGOUT */
function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

</script>

</body>
</html>
