<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

.hidden {
    display: none;
}

/* APP */
#app {
    width: 100%;
    max-width: 500px;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    color: white;
}

.course {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authPage" class="card">

    <h2>Вход</h2>

    <input id="email" placeholder="Логин">
    <input id="password" type="password" placeholder="Пароль">

    <button onclick="login()">Войти</button>

</div>

<!-- APP -->
<div id="app" class="hidden">

    <div class="header">
        <span>📚 Courses</span>
        <button onclick="logout()">Выйти</button>
    </div>

    <!-- COURSES -->
    <div id="coursesPage">
        <h2 style="color:white">Курсы</h2>
        <div id="coursesList"></div>
    </div>

    <!-- LESSONS -->
    <div id="lessonsPage" class="hidden">
        <button onclick="back()">⬅ Назад</button>
        <h2 id="courseTitle"></h2>
        <div id="lessonsList"></div>
    </div>

    <!-- ADMIN -->
    <div id="adminPage" class="hidden">
        <h2 style="color:white">👑 Админ панель</h2>

        <input id="courseInput" placeholder="Название курса">
        <button onclick="addCourse()">Добавить курс</button>

        <input id="lessonCourse" placeholder="Курс">
        <input id="lessonTitle" placeholder="Урок">
        <input id="lessonVideo" placeholder="Ссылка видео">
        <button onclick="addLesson()">Добавить урок</button>

        <div id="adminCourses"></div>
    </div>

</div>

<script>

/* 🔥 ВСТРОЕННЫЙ АДМИН */
(function() {
    let users = JSON.parse(localStorage.getItem("users") || "[]");

    let exists = users.find(u => u.email === "user614362");

    if (!exists) {
        users.push({
            name: "fol",
            email: "user614362",
            password: "ppjquc",
            is_admin: 1
        });

        localStorage.setItem("users", JSON.stringify(users));
    }
})();

/* ВХОД */
function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users") || "[]");

    let user = users.find(u => u.email === email && u.password === password);

    if (!user) {
        alert("❌ Неверный логин или пароль");
        return;
    }

    localStorage.setItem("currentUser", JSON.stringify(user));

    enterApp(user);
}

/* АВТО ВХОД */
window.onload = function() {
    let user = JSON.parse(localStorage.getItem("currentUser"));
    if (user) enterApp(user);
};

/* ВХОД В ПРИЛОЖЕНИЕ */
function enterApp(user) {
    document.getElementById("authPage").style.display = "none";
    document.getElementById("app").classList.remove("hidden");

    loadCourses();

    if (user.is_admin == 1) {
        document.getElementById("adminPage").classList.remove("hidden");
        loadAdmin();
    }
}

/* КУРСЫ */
function loadCourses() {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    let div = document.getElementById("coursesList");
    div.innerHTML = "";

    courses.forEach((c, i) => {
        div.innerHTML += `<div class="course" onclick="openCourse(${i})">${c.title}</div>`;
    });
}

let currentCourseIndex = null;

/* ОТКРЫТЬ КУРС */
function openCourse(i) {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    currentCourseIndex = i;

    document.getElementById("coursesPage").classList.add("hidden");
    document.getElementById("lessonsPage").classList.remove("hidden");

    document.getElementById("courseTitle").innerText = courses[i].title;

    let lessonsDiv = document.getElementById("lessonsList");
    lessonsDiv.innerHTML = "";

    courses[i].lessons.forEach(l => {
        lessonsDiv.innerHTML += `<div>${l.title} <a href="${l.video}" target="_blank">▶</a></div>`;
    });
}

/* НАЗАД */
function back() {
    document.getElementById("lessonsPage").classList.add("hidden");
    document.getElementById("coursesPage").classList.remove("hidden");
}

/* ДОБАВИТЬ КУРС */
function addCourse() {
    let title = document.getElementById("courseInput").value;

    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    courses.push({ title, lessons: [] });

    localStorage.setItem("courses", JSON.stringify(courses));

    loadCourses();
    loadAdmin();
}

/* ДОБАВИТЬ УРОК */
function addLesson() {
    let name = document.getElementById("lessonCourse").value;
    let title = document.getElementById("lessonTitle").value;
    let video = document.getElementById("lessonVideo").value;

    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    let course = courses.find(c => c.title === name);

    if (!course) {
        alert("Курс не найден");
        return;
    }

    course.lessons.push({ title, video });

    localStorage.setItem("courses", JSON.stringify(courses));

    loadAdmin();
}

/* АДМИН СПИСОК */
function loadAdmin() {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    let div = document.getElementById("adminCourses");
    div.innerHTML = "";

    courses.forEach((c, i) => {
        div.innerHTML += `<div>${c.title} <button onclick="deleteCourse(${i})">❌</button></div>`;
    });
}

/* УДАЛИТЬ */
function deleteCourse(i) {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    courses.splice(i, 1);

    localStorage.setItem("courses", JSON.stringify(courses));

    loadCourses();
    loadAdmin();
}

/* ВЫХОД */
function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

</script>

</body>
</html>
